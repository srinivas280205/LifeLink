<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LifeLink — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #0d0d0d; color: #fff; font-family: system-ui, sans-serif;
      text-align: center; padding: 2rem;
    }
    .heart {
      font-size: 4rem; margin-bottom: 1.5rem;
      animation: beat 1.2s ease-in-out infinite;
    }
    @keyframes beat {
      0%,100% { transform: scale(1); }
      14%      { transform: scale(1.15); }
      28%      { transform: scale(1); }
      42%      { transform: scale(1.1); }
    }
    h1 { font-size: 1.6rem; font-weight: 800; margin-bottom: 0.5rem; color: #d32f2f; }
    p  { font-size: 0.95rem; color: #888; max-width: 320px; line-height: 1.6; margin-bottom: 2rem; }
    .retry {
      padding: 0.75rem 2rem; border-radius: 10px; border: none;
      background: linear-gradient(135deg, #d32f2f, #1a237e);
      color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer;
    }
    .tip {
      margin-top: 2rem; font-size: 0.78rem; color: #555;
      border: 1px solid #222; border-radius: 10px; padding: 0.9rem 1.25rem;
      max-width: 320px;
    }
  </style>
</head>
<body>
  <div class="heart">❤️</div>
  <h1>You're Offline</h1>
  <p>LifeLink needs an internet connection to connect donors with those in need.</p>
  <button class="retry" onclick="window.location.reload()">Try Again</button>
  <div class="tip">
    💡 In a real emergency, call <strong>108</strong> (Ambulance) or<br />
    <strong>1910</strong> (National Blood Helpline)
  </div>
</body>
</html>
